<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Upload Resume</h1>
            <form>
                <div class="form-group">
                    <label for="resume">Upload PDF Resume</label>
                    <input type="file" id="resume" accept=".pdf">
                </div>
                <a href="candidate_dashboard.html" class="btn">Upload</a>
            </form>
            <div class="info-message">
                <p>Don't have a resume? <a href="resume_builder.html">Click here to build one.</a></p>
            </div>
            <div class="back-link">
                <a href="candidate_login.html">Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
