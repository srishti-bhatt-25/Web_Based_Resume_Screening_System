<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Template</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Template Selection</h1>
            <p style="color: #666; margin-bottom: 20px;">Choose a resume template</p>
            <div class="template-options">
                <div class="template-card">
                    <h3>Template 1</h3>
                    <p>Classic Professional Style</p>
                    <button class="btn-small" onclick="alert('Resume generated successfully!'); setTimeout(() => window.location.href='upload_resume.html', 500);">Select Template 1</button>
                </div>
                <div class="template-card">
                    <h3>Template 2</h3>
                    <p>Modern Minimalist Style</p>
                    <button class="btn-small" onclick="alert('Resume generated successfully!'); setTimeout(() => window.location.href='upload_resume.html', 500);">Select Template 2</button>
                </div>
            </div>
            <div class="back-link">
                <a href="resume_builder.html">Back to Resume Builder</a>
            </div>
        </div>
    </div>
</body>
</html>
